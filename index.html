<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="description" content="Retro arcade splash page - a nostalgic journey back to 1987">
    <meta name="author" content="Your Name">

    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="8-BIT ARCADE">
    <meta property="og:description" content="Step into the arcade - Press Start to begin">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://via.placeholder.com/1200x630?text=8-BIT+ARCADE">

    <title>8-BIT ARCADE | Retro Splash Page</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/scanlines.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <!-- CRT Overlay Effects -->
    <div class="crt-overlay"></div>
    <div class="vignette"></div>

    <!-- Main Arcade Container -->
    <main class="arcade-container" id="arcadeContainer">
        <!-- Ambient Glow -->
        <div class="ambient-glow"></div>

        <!-- Title Section -->
        <div class="title-wrapper">
            <h1 class="arcade-title">
                <span class="glitch-text" data-text="8-BIT">8-BIT</span>
            </h1>
            <h1 class="arcade-title">
                <span class="glitch-text" data-text="ARCADE">ARCADE</span>
            </h1>
        </div>

        <!-- Subtitle -->
        <p class="subtitle">WHERE LEGENDS ARE MADE</p>

        <!-- Coin / Credit Display -->
        <div class="credit-display">
            <span class="credit-label">CREDITS:</span>
            <span class="credit-amount" id="creditAmount">0</span>
        </div>

        <!-- Main Action Button -->
        <button id="startButton" class="start-button">
            <span class="button-text">&#9654; PRESS START</span>
            <span class="button-glow"></span>
        </button>

        <!-- Coin Slot Section -->
        <div class="coin-slot" id="coinSlot">
            <div class="coin-slot__insert">INSERT COIN</div>
            <div class="coin-slot__graphic">
                <span class="slot-top">&#9484;&#9472;&#9472;&#9472;&#9472;&#9472;&#9488;</span>
                <span class="slot-middle">&#9474;  &#9633;  &#9474;</span>
                <span class="slot-bottom">&#9492;&#9472;&#9472;&#9472;&#9472;&#9472;&#9496;</span>
            </div>
            <div class="coin-instruction">(CLICK TO INSERT COIN)</div>
        </div>

        <!-- Game Info Panel -->
        <div class="game-info">
            <div class="info-line">
                <span class="info-label">HIGH SCORE:</span>
                <span class="info-value" id="highScore">0</span>
            </div>
            <div class="info-line">
                <span class="info-label">PLAYERS:</span>
                <span class="info-value" id="playersCount">1</span>
            </div>
        </div>

        <!-- Easter Egg Indicator -->
        <div class="easter-egg-indicator" id="easterEggIndicator">
            &#9889; KONAMI CODE ACTIVATED &#9889;
        </div>

        <!-- Footer -->
        <footer class="arcade-footer">
            <p>&copy; 1987 / 2025 &mdash; INSERT COIN TO CONTINUE</p>
        </footer>
    </main>

    <!-- Modal Overlay (hidden by default) -->
    <div id="gameModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>&#9889; GAME START &#9889;</h2>
                <button class="modal-close" id="closeModal">&times;</button>
            </div>
            <div class="modal-body">
                <p class="modal-message" id="modalMessage">CREDITS DETECTED!</p>
                <div class="modal-options">
                    <button class="modal-btn" id="playAgainBtn">&#9654; PLAY AGAIN</button>
                    <button class="modal-btn" id="closeModalBtn">&#10006; CLOSE</button>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="js/audio.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/easter-egg.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
